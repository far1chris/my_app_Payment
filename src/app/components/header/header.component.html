<header class="app-header">
  <div class="header-left">
    <!-- Location Selector -->
    <div class="location-selector" [id]="'location-trigger-' + componentId" style="cursor: pointer;">
      <div class="hospital-icon">
        <img src="assets/icon/ic_location.png" alt="Location" width="24" height="24" />
      </div>
      <span class="colon">:</span>
      <span class="loc-text">หน่วยบริการ A</span>
      <ion-icon name="chevron-down-outline" class="chevron"></ion-icon>
    </div>
    
    <ion-popover [trigger]="'location-trigger-' + componentId" triggerAction="click" alignment="start" class="premium-popover" [dismissOnSelect]="true">
      <ng-template>
        <ion-content class="custom-popover-content">
          <div class="popover-header">
            <span class="ph-title">เลือกหน่วยบริการ</span>
          </div>
          <div class="popover-body">
            <div class="p-item active">
              <div class="p-icon"><ion-icon name="medkit-outline"></ion-icon></div>
              <div class="p-text">หน่วยบริการ A</div>
              <ion-icon name="checkmark-circle" class="check-icon"></ion-icon>
            </div>
            <div class="p-item">
              <div class="p-icon"><ion-icon name="medkit-outline"></ion-icon></div>
              <div class="p-text">หน่วยบริการ B (ศูนย์ตา)</div>
            </div>
          </div>
        </ion-content>
      </ng-template>
    </ion-popover>
  </div>

  <div class="header-right">

    <!-- Notifications -->
    <div class="notification-icon" [id]="'notification-trigger-' + componentId" style="cursor: pointer;">
      <ion-icon name="notifications-outline"></ion-icon>
      <span class="badge">1</span>
    </div>

    <ion-popover [trigger]="'notification-trigger-' + componentId" triggerAction="click" alignment="center" class="premium-popover">
      <ng-template>
        <ion-content class="custom-popover-content">
          <div class="popover-header">
            <span class="ph-title">การแจ้งเตือน</span>
            <span class="ph-action">อ่านทั้งหมด</span>
          </div>
          <div class="popover-body">
            <div class="p-item unread">
              <div class="p-icon notif"><ion-icon name="alert-circle-outline"></ion-icon></div>
              <div class="p-text">
                <strong>มีรายการ X-ray เข้าใหม่</strong>
                <span>เคสคุณสมหมาย ใจดี (ด่วน)</span>
                <span class="time">เพิ่งสัักครู่</span>
              </div>
              <div class="unread-dot"></div>
            </div>
          </div>
        </ion-content>
      </ng-template>
    </ion-popover>

    <!-- User Profile -->
    <div class="user-profile" [id]="'profile-trigger-' + componentId" style="cursor: pointer;">
      <div class="avatar">
        <img src="assets/user_avatar.png" alt="User" />
      </div>
      <div class="user-info">
        <span class="user-name">นายพัธรนัส จิตภักดี</span>
        <span class="user-role">เจ้าหน้าที่รังสี</span>
      </div>
      <ion-icon name="chevron-down-outline" class="dropdown-icon"></ion-icon>
    </div>

    <ion-popover [trigger]="'profile-trigger-' + componentId" triggerAction="click" alignment="end" class="premium-popover" [dismissOnSelect]="true">
      <ng-template>
        <ion-content class="custom-popover-content">
          <div class="profile-header">
            <div class="avatar-lg">
              <img src="assets/user_avatar.png" alt="User" />
            </div>
            <div class="p-info">
              <strong>นายพัธรนัส จิตภักดี</strong>
              <span>เจ้าหน้าที่รังสี</span>
            </div>
          </div>
          <div class="popover-body">
            <div class="p-item">
              <div class="p-icon"><ion-icon name="person-outline"></ion-icon></div>
              <div class="p-text">โปรไฟล์ของฉัน</div>
            </div>
            <div class="p-item">
              <div class="p-icon"><ion-icon name="settings-outline"></ion-icon></div>
              <div class="p-text">ตั้งค่าบัญชี</div>
            </div>
            <div class="divider"></div>
            <div class="p-item danger">
              <div class="p-icon"><ion-icon name="log-out-outline"></ion-icon></div>
              <div class="p-text">ออกจากระบบ</div>
            </div>
          </div>
        </ion-content>
      </ng-template>
    </ion-popover>

  </div>
</header>
