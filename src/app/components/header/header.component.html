<header class="app-header">
  <div class="header-left">
    <!-- Intentionally left blank as the logo is in the sidebar -->
  </div>

  <div class="header-right">
    <div class="location-selector" (click)="openLocation()" style="cursor: pointer;">
      <div class="hospital-icon">
        <ion-icon name="medkit-outline"></ion-icon>
      </div>
      <span>: หน่วยบริการ A</span>
      <ion-icon name="chevron-down-outline" class="chevron"></ion-icon>
    </div>
    
    <div class="notification-icon" (click)="openNotifications()" style="cursor: pointer;">
      <ion-icon name="notifications-outline"></ion-icon>
      <span class="badge">1</span>
    </div>

    <div class="user-profile" (click)="openProfile()" style="cursor: pointer;">
      <div class="avatar">
        <!-- Placeholder for user avatar -->
        <img src="https://ui-avatars.com/api/?name=TN&background=e2e8f0&color=334155" alt="User" />
      </div>
      <div class="user-info">
        <span class="user-name">นายพัชรพงศ์ จิตภักดี</span>
        <span class="user-role">เจ้าหน้าที่รังสี</span>
      </div>
      <ion-icon name="chevron-down-outline" class="dropdown-icon"></ion-icon>
    </div>
  </div>
</header>
