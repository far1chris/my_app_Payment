<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <title>Ionic App</title>

  <base href="/" />

  <meta name="color-scheme" content="light" />
  <meta name="viewport" content="viewport-fit=cover, width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="format-detection" content="telephone=no" />
  <meta name="msapplication-tap-highlight" content="no" />

  <link rel="icon" type="image/png" href="assets/icon/favicon.png" />

  <!-- add to homescreen for ios -->
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black" />

  <!-- Background color override — bypasses CSS file cache -->
  <style>
    :root { --ion-background-color: #EEF2F8; }
    html, body { background-color: #EEF2F8; }
    ion-app { background-color: #EEF2F8; }
    .ion-page { background-color: #EEF2F8; }
    ion-content { --background: #EEF2F8; }
    ion-content::part(background) { background: #EEF2F8; }
  </style>
</head>

<body>
  <app-root></app-root>
</body>

</html>
