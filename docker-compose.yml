version: '3.8'

services:
  api:
    build:
      context: ./mock-api
    ports:
      - "3000:3000"
    volumes:
      - ./mock-api/db.json:/app/db.json
    restart: unless-stopped

  frontend:
    build:
      context: .
    ports:
      - "4200:80"
    depends_on:
      - api
    restart: unless-stopped
